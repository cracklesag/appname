# Swardly CI — typecheck + lint + engine tests on every push.
# Needs no secrets. Lives alongside db-backup.yml (which stays repo-only);
# unzipping a build chunk only ADDS this file, it never touches the backup
# workflow.
name: CI
on:
  push:
    branches: ['**']
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run test
